<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <h2 class="loginText">Login To Your Account</h2>
        
        <form class="input-container">
            <div class="field-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="input-field" placeholder="Enter username">
            </div>
            
            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-field" placeholder="Enter password">
            </div>

            <div class="button-container">
                <button type="submit" class="enter-btn">Enter</button>
            </div>
        </form>

        <div class="footer-links">
            <a href="#">Forgot Password?</a>
            <a href="#">Create Account</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
